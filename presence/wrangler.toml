name = "xclusivexo-presence"
main = "worker.js"
compatibility_date = "2025-06-01"

# Durable Object holds the live connection set in memory (no stored data).
[[durable_objects.bindings]]
name = "PRESENCE"
class_name = "Presence"

# SQLite-backed class so it's eligible on the Workers free tier (we don't actually
# use SQLite storage — presence is in-memory only).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Presence"]
