<meta charset="utf-8">
<title>The Village · xclusivexo.com</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="An ambient pixel village — little critters share aspirational quotes, live headlines, and on-this-day facts. A small interactive corner of xclusivexo.com.">
<meta name="theme-color" content="#04060d">
<style>
  html, body { margin: 0; height: 100%; background: #04060d; overflow: hidden;
    -webkit-user-select: none; user-select: none; }
  #scene { position: absolute; inset: 0; width: 100%; height: 100%; }
  #stage { position: absolute; inset: 0; }
  .critter { position: absolute; top: 0; left: 0; width: 76px; height: 76px;
    image-rendering: pixelated; image-rendering: crisp-edges;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,.45)); will-change: transform; }
  .note { position: absolute; top: 0; left: 0; font: 15px ui-monospace, monospace;
    color: rgba(150,225,255,.9); text-shadow: 0 0 7px rgba(90,212,255,.7);
    opacity: 0; transition: opacity .4s, transform 1.1s; pointer-events: none; will-change: transform; }
  .plate { position: absolute; top: 0; left: 0; font: 12px ui-monospace, monospace; white-space: nowrap;
    letter-spacing: .04em; text-shadow: 0 1px 3px rgba(0,0,0,.85); opacity: 0; transition: opacity .6s;
    pointer-events: none; will-change: transform; }
  .bubble { position: absolute; top: 0; left: 0; max-width: 272px; font: 12px ui-monospace, monospace;
    color: #eaf6ff; background: rgba(10,18,28,.84); border: 1px solid rgba(90,200,255,.32); border-radius: 9px;
    padding: 4px 9px; box-shadow: 0 2px 12px rgba(0,0,0,.5); opacity: 0; transition: opacity .5s;
    pointer-events: none; will-change: transform, opacity; }
  #tag { position: absolute; bottom: 8px; right: 14px; font: 10px ui-monospace, monospace;
    letter-spacing: .1em; color: rgba(120,205,255,.4); text-shadow: 0 0 5px rgba(0,0,0,.7); }
  #backlink, #sound, #makeown { position: fixed; top: 14px; z-index: 9999; font: 12.5px 'SF Mono', ui-monospace, Menlo, monospace;
    color: #5ad4ff; text-shadow: 0 0 8px rgba(86,206,255,.5); border: 1px solid rgba(86,206,255,.4);
    border-radius: 8px; padding: 8px 13px; background: rgba(6,16,30,.7); text-decoration: none; cursor: pointer; }
  #backlink { left: 14px; } #sound { right: 14px; }
  #makeown { left: 14px; bottom: 14px; top: auto; }
  #backlink:hover, #sound:hover, #makeown:hover { border-color: rgba(86,206,255,.9); }
  @media (max-width: 640px){
    .bubble { max-width: 78vw; font-size: 11.5px; padding: 4px 8px; }

    #backlink { left: 10px; } #sound { right: 10px; } #makeown { left: 10px; bottom: 10px; }

<script>
/* The Village (public web edition) — an ambient, self-contained pixel village. Critters roam a themed
   night town and, at the gazebo, sing procedural 8-bit music. For personality they surface aspirational
   quotes (public-domain, bundled), live headlines (Hacker News), and on-this-day facts (Wikipedia).
   Fully client-side: no backend, no tracking, no private data. A small interactive page for xclusivexo.com. */
"use strict";
var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
var SENT = [255,0,255], SP = 76;
var heat = 2, idle = 0, audioOn = false, vol = 0.5, hidden = false, lowPower = false;
var critters = [], W = innerWidth, H = innerHeight, t0 = 0;
var cv = document.getElementById('scene'), cx = cv.getContext('2d');
var stage = document.getElementById('stage'), tag = document.getElementById('tag');
var IDLE_WAKE = 0;                                    // 0 = always lively (no idle wait) — they start as soon as the village opens

/* ── Critter personalities (data-driven — add an entry to give a new animal a voice + quirk) ──
   motif = MIDI notes (relative singing line); role: singer (leads), harmony (holds a chord tone),
   peep (chirps + joins). key is the village key the gazebo harmonizes in. */
var KEY = 57;                                         // A3 — the village's home note (MIDI)
var SCALE = [0,2,3,5,7,8,10,12];                      // natural minor degrees
var PERSONA = {
  cat:      { role:'singer',  wave:'triangle', octave:1,  motif:[0,3,7,5,7,12,10,7], quirk:'diva',   tag:'the diva' },
  frog:     { role:'singer',  wave:'square',   octave:-1, motif:[0,0,7,0,5,0,3,0],   quirk:'croak',  tag:'the cantor' },
  owl:      { role:'singer',  wave:'triangle', octave:-1, motif:[0,4,7,4,0,7,5,0],   quirk:'hoot',   tag:'the nightcantor' },
  bird:     { role:'singer',  wave:'triangle', octave:2,  motif:[12,14,12,10,12,7],  quirk:'flit',   tag:'the songbird' },
  fox:      { role:'harmony', wave:'sawtooth', octave:0,  motif:[7,10,7,12],         quirk:'prowl',  tag:'the prowler' },
  mouse:    { role:'harmony', wave:'square',   octave:1,  motif:[12,10,7,5,3],       quirk:'dart',   tag:'the tinkerer' },
  hedgehog: { role:'harmony', wave:'square',   octave:0,  motif:[3,5,3,0],           quirk:'curl',   tag:'the harmonist' },
  bear:     { role:'bass',    wave:'sawtooth', octave:-2, motif:[0,4,0],             quirk:'lumber', tag:'the bass' },
  rabbit:   { role:'peep',    wave:'square',   octave:1,  motif:[7,7,12,7],          quirk:'hop',    tag:'the hopper' },
  chick:    { role:'peep',    wave:'triangle', octave:2,  motif:[12,12,7],           quirk:'follow', tag:'the peep' }
};
var DEF = { role:'peep', wave:'square', octave:1, motif:[0,7,12], quirk:'amble', tag:'villager' };
function persona(name){ return PERSONA[name] || DEF; }

/* ── Procedural 8-bit audio (no samples, all oscillators) ── */
var AC = null, master = null, bed = [], audioReady = false;
function midi(n){ return 440 * Math.pow(2, (n - 69) / 12); }
function ensureAudio(){
  if (AC) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0; master.connect(AC.destination);
  } catch(e){ AC = null; }
}
function wakeAudio(){                                 // resume the context (may need a gesture on some webviews)
  if (!AC) ensureAudio();
  if (AC && AC.state === 'suspended') AC.resume().then(function(){ audioReady = (AC.state==='running'); });
  else if (AC) audioReady = (AC.state === 'running');
}
function startBed(){                                  // soft ambient drone — the "background sound"
  if (!AC || bed.length) return;
  [KEY-12, KEY-12+7, KEY].forEach(function(n, i){
    var o = AC.createOscillator();
    var g = AC.createGain(); o.type = 'sine'; o.frequency.value = midi(n) * (i===1?1.005:1);
    g.gain.value = 0.06; o.connect(g); g.connect(master); o.start(); bed.push({o:o,g:g});
  });
  var lfo = AC.createOscillator(), lg = AC.createGain();      // slow breathing on the bed
  lfo.frequency.value = 0.07; lg.gain.value = 0.025; lfo.connect(lg);
  bed.forEach(function(b){ lg.connect(b.g.gain); }); lfo.start(); bed.push({o:lfo,g:lg});
}
function blip(freq, when, dur, wave, peak){           // one 8-bit note with a quick envelope
  if (!AC || !audioReady) return;
  var o = AC.createOscillator(), g = AC.createGain();
  o.type = wave || 'square'; o.frequency.setValueAtTime(freq, when);
  g.gain.setValueAtTime(0.0001, when);
  g.gain.exponentialRampToValueAtTime(peak || 0.18, when + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, when + (dur || 0.18));
  o.connect(g); g.connect(master); o.start(when); o.stop(when + (dur || 0.18) + 0.02);
}
var noiseBuf = null;
function getNoise(){ if (noiseBuf || !AC) return noiseBuf; var n=(AC.sampleRate*0.3)|0, b=AC.createBuffer(1,n,AC.sampleRate), d=b.getChannelData(0); for(var i=0;i<n;i++) d[i]=Math.random()*2-1; noiseBuf=b; return b; }
function drumHit(type, when, gain){                   // 8-bit percussion: kick (pitch-drop sine), snare/hat (filtered noise)
  if (!AC || !audioReady) return;
  if (type==='kick'){ var o=AC.createOscillator(), g=AC.createGain(); o.frequency.setValueAtTime(135,when); o.frequency.exponentialRampToValueAtTime(45,when+0.12);
    g.gain.setValueAtTime(gain||0.3,when); g.gain.exponentialRampToValueAtTime(0.001,when+0.16); o.connect(g); g.connect(master); o.start(when); o.stop(when+0.18); return; }
  var s=AC.createBufferSource(); s.buffer=getNoise(); var fl=AC.createBiquadFilter();
  fl.type=type==='hat'?'highpass':'bandpass'; fl.frequency.value=type==='hat'?7000:1800;
  var g2=AC.createGain(), dur=type==='hat'?0.04:0.13; g2.gain.setValueAtTime(gain||0.16,when); g2.gain.exponentialRampToValueAtTime(0.001,when+dur);
  s.connect(fl); fl.connect(g2); g2.connect(master); s.start(when); s.stop(when+dur+0.02);
}
function noteFor(p, degreeIdx){                       // map a motif step (scale degree) to a frequency
  var deg = SCALE[((degreeIdx % SCALE.length) + SCALE.length) % SCALE.length];
  return midi(KEY + deg + 12 * (p.octave || 0));
}
function emote(c){                                    // a short signature chirp as a critter roams
  if (!AC || !audioReady) return;
  var p = c.persona, now = AC.currentTime, m = p.motif;
  for (var i = 0; i < Math.min(2, m.length); i++) blip(noteFor(p, m[i]), now + i*0.09, 0.12, p.wave, 0.12);
  floatNote(c, '♪');
}
function sing(c, startAt, tempo, transpose){          // a full melodic line at the gazebo
  if (!AC || !audioReady) return;
  var p = c.persona, step = tempo || 0.34, tr = transpose || 0;
  p.motif.forEach(function(d, i){
    blip(noteFor(p, d + tr), startAt + i*step, step*0.92, p.wave, p.role==='singer'?0.2:0.14);
  });
  floatNote(c, p.role === 'singer' ? '♫' : '♩');
  return startAt + p.motif.length * step;
}
function harmonize(group){                            // several critters sing together — a synced round/chord
  if (!AC || !audioReady) return;
  var now = AC.currentTime + 0.15, chord = [0, 0, 4, 7];     // each voice offset within the key
  group.forEach(function(c, i){
    var transpose = chord[i % chord.length];
    var delay = c.persona.role === 'singer' ? 0 : 0.5;       // singers lead, harmony comes in on the off-phrase
    sing(c, now + delay, 0.32, transpose);
  });
}

var PROGRESSIONS = [[0,5,3,4],[0,3,4,0],[0,6,4,5],[0,2,5,4]];   // chord roots as scale-degree indices (minor colour)
function degFreq(idx, octave){                          // a scale-degree index (may exceed an octave) -> frequency
  var n=SCALE.length, deg=SCALE[((idx%n)+n)%n], oct=Math.floor(idx/n)+(octave||0);
  return midi(KEY + deg + 12*oct);
}
function performSong(group){                            // a COORDINATED, dynamic gazebo song over a chord progression
  if (!AC || !audioReady || !group.length) return;
  var now=AC.currentTime+0.2, bar=0.92, prog=PROGRESSIONS[(Math.random()*PROGRESSIONS.length)|0];
  var round = group.length>=3 && Math.random()<0.4;    // sometimes a staggered canon instead of parts
  var lead = group.filter(function(c){return c.persona.role==='singer';})[0] || group[0];
  var bars = prog.length*2;
  group.forEach(function(c, vi){
    var p=c.persona, entry = now + (round ? vi*bar*0.5 : Math.min(vi,2)*bar);   // canon entry / parts build up
    floatNote(c, p.role==='peep'?'♩':'♫');
    for (var b=0;b<bars;b++){ var t=entry + b*bar, root=prog[b%prog.length];
      if (round){ var m=lead.persona.motif; for(var i=0;i<m.length;i++) blip(degFreq(m[i]+root,p.octave), t+i*(bar/m.length)*0.95, (bar/m.length)*0.9, p.wave, 0.15); }
      else if (c===lead){ var mm=p.motif; for(var j=0;j<mm.length;j++) blip(degFreq(mm[j]+root,p.octave), t+j*(bar/mm.length)*0.95, (bar/mm.length)*0.9, p.wave, 0.2); }
      else if (p.role==='bass'){ blip(degFreq(root,-1), t, bar*0.9, 'sawtooth', 0.14); }
      else if (p.role==='peep'){ blip(degFreq(root+7,p.octave), t+bar*0.5, bar*0.25, p.wave, 0.1); }
      else { blip(degFreq(root+[0,2,4][vi%3],0), t, bar*0.9, p.wave, 0.12); }   // harmony: a triad tone
    }
  });
  BITS.push({ prog:prog, motif:lead.persona.motif, octave:lead.persona.octave }); if (BITS.length>6) BITS.shift();
  groove = Math.min(1, groove + 0.25);                 // each song composes a "bit" + builds toward a concert
}

/* ── floating note glyph above a critter ── */
function floatNote(c, glyph){
  var n = document.createElement('div'); n.className = 'note'; n.textContent = glyph;
  stage.appendChild(n);
  n.style.transform = 'translate(' + (c.x+30) + 'px,' + (c.y-2) + 'px)';
  requestAnimationFrame(function(){ n.style.opacity = '1';
    n.style.transform = 'translate(' + (c.x+30+(Math.random()*16-8)) + 'px,' + (c.y-34) + 'px)'; });
  setTimeout(function(){ n.style.opacity = '0'; setTimeout(function(){ n.remove(); }, 500); }, 900);
}

/* ── sprite recolor (sentinel magenta -> the critter's eye color), as in critter.html ── */
var EYE = ['#5ad4ff','#3df0bb','#ffb547','#ff7a9c','#9b8cff','#ffd23f','#ff5d6c','#7CFC98'];
/* ── simple clothing/accessories, drawn on the 32px sprite canvas (pixel coords) so they bake into the critter ── */
function aTopHat(g,c){ g.fillStyle='#1b1720'; g.fillRect(10,5,12,2); g.fillRect(13,0,6,5); g.fillStyle=c; g.fillRect(13,3,6,1); }
function aParty(g,c){ g.fillStyle=c; g.beginPath(); g.moveTo(16,0); g.lineTo(11,8); g.lineTo(21,8); g.closePath(); g.fill(); g.fillStyle='#fff'; g.fillRect(15,0,2,2); }
function aCap(g,c){ g.fillStyle=c; g.fillRect(11,3,10,4); g.fillRect(19,5,6,2); }
function aBeanie(g,c){ g.fillStyle=c; g.fillRect(10,2,12,5); g.fillStyle='#fff'; g.fillRect(15,0,2,2); }
function aCrown(g,c){ g.fillStyle=c; g.beginPath(); g.moveTo(11,5); g.lineTo(12,1); g.lineTo(14,4); g.lineTo(16,0); g.lineTo(18,4); g.lineTo(20,1); g.lineTo(21,5); g.closePath(); g.fill(); }
function aGlasses(g,c){ g.strokeStyle=c; g.lineWidth=1; g.strokeRect(9,17,5,4); g.strokeRect(18,17,5,4); g.beginPath(); g.moveTo(14,19); g.lineTo(18,19); g.stroke(); }
function aShades(g,c){ g.fillStyle='#15171c'; g.fillRect(9,17,6,4); g.fillRect(17,17,6,4); g.fillRect(15,18,2,1); }
function aBowtie(g,c){ g.fillStyle=c; g.beginPath(); g.moveTo(13,25); g.lineTo(16,27); g.lineTo(13,29); g.closePath(); g.fill(); g.beginPath(); g.moveTo(19,25); g.lineTo(16,27); g.lineTo(19,29); g.closePath(); g.fill(); g.fillStyle='#fff'; g.fillRect(15,26,2,2); }
function aScarf(g,c){ g.fillStyle=c; g.fillRect(9,25,13,3); g.fillRect(18,27,3,5); }
function aFlower(g,c){ g.fillStyle=c; g.fillRect(5,8,1,1); g.fillRect(8,8,1,1); g.fillRect(5,11,1,1); g.fillRect(8,11,1,1); g.fillStyle='#ffd23f'; g.fillRect(6,9,2,2); }
function aHeadphones(g,c){ g.strokeStyle=c; g.lineWidth=2; g.beginPath(); g.arc(16,11,8,Math.PI,2*Math.PI); g.stroke(); g.fillStyle=c; g.fillRect(7,10,3,5); g.fillRect(22,10,3,5); }
var HATS=[aTopHat,aParty,aCap,aBeanie,aCrown,aHeadphones], FACE=[aGlasses,aShades], NECK=[aBowtie,aScarf];
var ACCENT=['#ff5d6c','#5ad4ff','#3df0bb','#ffd23f','#9b8cff','#ff7a9c','#e8f0f6','#ff9f43'];
var BAND_UNIFORM=[{fn:aCap,c:'#e0463a'},{fn:aBowtie,c:'#ffd23f'}];   // matching kit the performers don during a concert
function _pa(a){ return a[(Math.random()*a.length)|0]; }
function _pc(){ return ACCENT[(Math.random()*ACCENT.length)|0]; }
function pickOutfit(){ var o=[];                          // a simple multi-piece outfit: maybe a hat, maybe glasses, maybe a neck-piece
  if (Math.random()<0.6) o.push({fn:_pa(HATS),c:_pc()}); else if (Math.random()<0.3) o.push({fn:aFlower,c:_pc()});
  if (Math.random()<0.35) o.push({fn:_pa(FACE),c:_pc()});
  if (Math.random()<0.35) o.push({fn:_pa(NECK),c:_pc()});
  return o;
}
function recolor(dataUri, hex, outfit){
  return new Promise(function(resolve){
    var img = new Image();
    img.onload = function(){
      var c = document.createElement('canvas'); c.width = img.width; c.height = img.height;
      var g = c.getContext('2d'); g.drawImage(img,0,0);
      var d = g.getImageData(0,0,c.width,c.height), p = d.data;
      var R = parseInt(hex.slice(1,3),16), G = parseInt(hex.slice(3,5),16), B = parseInt(hex.slice(5,7),16);
      for (var i=0;i<p.length;i+=4){ if(p[i]===SENT[0]&&p[i+1]===SENT[1]&&p[i+2]===SENT[2]&&p[i+3]>0){ p[i]=R;p[i+1]=G;p[i+2]=B; } }
      g.putImageData(d,0,0);
      if (outfit) outfit.forEach(function(a){ try{ a.fn(g, a.c); }catch(e){} });   // bake the outfit pieces on top
      resolve(c.toDataURL());
    };
    img.src = dataUri;
  });

  cx.beginPath(); cx.moveTo(gz.x-w*0.42, baseY-58); cx.lineTo(gz.x, baseY-84); cx.lineTo(gz.x+w*0.42, baseY-58); cx.closePath(); cx.fill(); cx.shadowBlur=0;
}

/* ── critter movement: roam the ground, or gather at the gazebo to perform ── */
var ENERGY = { 0:0, 1:0.5, 2:0.9, 3:1.6, 4:2.6 };
function stepCritters(dt){
  var awake = idle >= IDLE_WAKE && !reduced, e = ENERGY[heat] != null ? ENERGY[heat] : 0.9;
  var pop = 0; for (var n=0;n<critters.length;n++) if (critters[n].mode!=='leaving' && !critters[n].resident) pop++;
  for (var k=critters.length-1;k>=0;k--){ var c=critters[k]; var moving=false;
    if (c.mode==='leaving'){                              // wander off the nearest edge, then despawn
      var dir = c.x < W/2 ? -1 : 1; c.x += dir*Math.max(2.2, c.speed*1.6); c.bob+=0.3; c.face=dir; moving=true;
      if (c.x < -SP-12 || c.x > W+SP+12){ c.el.remove(); critters.splice(k,1); continue; }
    } else if (c.mode==='inside'){                        // tucked in a building -> shown in a window by drawBuildings
      if ((c.insideT-=dt) <= 0){ if(c.room) c.room.occupant=null; c.room=null; c.el.style.display='';
        c.x=c.bdoor.x-SP/2; c.y=groundY()-SP*0.4; c.mode='exitBldg'; c.target={ x:Rn(W*0.1,W*0.9), y:groundY()+Rn(0,20) }; }
      continue;                                           // hidden while inside — no sprite transform
    } else if (c.mode==='enterBldg'){                     // walk to a door, then step inside
      var bx2=c.target.x-c.x, by2=c.target.y-c.y, bd=Math.hypot(bx2,by2);
      if (bd>5){ c.angle=Math.atan2(by2,bx2); var bs=Math.min(bd,2.2); c.x+=Math.cos(c.angle)*bs; c.y+=Math.sin(c.angle)*bs; c.bob+=0.3; c.face=bx2<0?-1:1; moving=true; }
      else { var free=c.targetB.rooms.filter(function(r){return !r.occupant;});
        if (free.length){ var rm=free[(Math.random()*free.length)|0]; rm.occupant=c; c.room=rm; c.bdoor=c.targetB.door; c.el.style.display='none'; c.mode='inside'; c.insideT=Rn(8,22); }
        else c.mode='roam'; continue; }
    } else if (c.mode==='exitBldg'){                      // step back out and resume roaming
      var qx=c.target.x-c.x, qy=c.target.y-c.y, qd=Math.hypot(qx,qy);
      if (qd>5){ c.angle=Math.atan2(qy,qx); var qs=Math.min(qd,2.2); c.x+=Math.cos(c.angle)*qs; c.y+=Math.sin(c.angle)*qs; c.bob+=0.3; c.face=qx<0?-1:1; moving=true; }
      else { var nx=BUILDINGS.filter(function(b){ return b!==c.targetB && b.rooms.some(function(r){return !r.occupant;}); });   // door-to-door: stroll to the next shop
        if (nx.length && Math.random()<0.45){ var nb=nx[(Math.random()*nx.length)|0]; c.mode='enterBldg'; c.targetB=nb; c.target={ x:nb.door.x-SP/2, y:groundY()-SP*0.4 }; }
        else c.mode='roam'; }
    } else if (c.mode==='arriving'){                      // walk in from the edge to a spot, then roam
      var ax=c.target.x-c.x, ay=c.target.y-c.y, ad=Math.hypot(ax,ay);
      if (ad>4){ c.angle=Math.atan2(ay,ax); var as=Math.min(ad,2.4); c.x+=Math.cos(c.angle)*as; c.y+=Math.sin(c.angle)*as; c.bob+=0.3; c.face=ax<0?-1:1; moving=true; }
      else c.mode='roam';
    } else if (c.mode==='toGazebo' || c.mode==='perform'){
      var dx=c.target.x-c.x, dy=c.target.y-c.y, dist=Math.hypot(dx,dy);
      if (dist>4 && c.mode==='toGazebo'){ c.angle=Math.atan2(dy,dx); var gs=Math.min(dist,2.2); c.x+=Math.cos(c.angle)*gs; c.y+=Math.sin(c.angle)*gs; c.bob+=0.3; c.face=dx<0?-1:1; moving=true; }
      else if (c.mode==='toGazebo'){ c.mode='perform'; }
    } else if ((perfActive || concertActive) && !reduced){  // AUDIENCE: gather round the gazebo + dance to the show
      var gzA=gazebo(), ax2=gzA.x-(c.x+SP/2), ay2=gzA.y-c.y, dd=Math.hypot(ax2,ay2);
      if (dd > gzA.r*1.5){ c.angle=Math.atan2(ay2,ax2); var ms=c.speed*1.3; c.x+=Math.cos(c.angle)*ms; c.y+=Math.sin(c.angle)*ms*0.4; moving=true; }
      c.face = ax2<0?-1:1;
    } else if (awake && e>0){                             // free roam along the ground
      c.angle += Rn(-0.12,0.12); var sp=c.speed*e;
      c.x += Math.cos(c.angle)*sp; c.y += Math.sin(c.angle)*sp*0.3;
      var gyTop=groundY()-26, gyBot=H-SP-8;
      if (c.x<8){c.x=8;c.angle=Math.PI-c.angle;} if (c.x>W-SP-8){c.x=W-SP-8;c.angle=Math.PI-c.angle;}
      if (c.y<gyTop){c.y=gyTop;c.angle=-c.angle;} if (c.y>gyBot){c.y=gyBot;c.angle=-c.angle;}
      c.bob += 0.22+e*0.05; c.face=Math.cos(c.angle)<0?-1:1; moving=true;
      if ((c.cooldown -= dt) <= 0){ c.cooldown=Rn(5,14); if (audioOn && audioReady && Math.random()<0.5) emote(c); }
      if (BUILDINGS.length && Math.random()<0.0012){       // occasionally pop into a shop/apartment + show up in a window
        var avb=BUILDINGS.filter(function(b){return b.rooms.some(function(r){return !r.occupant;});});
        if (avb.length){ var bb=avb[(Math.random()*avb.length)|0]; c.mode='enterBldg'; c.targetB=bb; c.target={ x:bb.door.x-SP/2, y:groundY()-SP*0.4 }; } }
      if ((c.ttl -= dt) <= 0 && pop > POP_MIN){ c.mode='leaving'; }    // lifespan up -> turnover
    }
    var dancing = (perfActive || concertActive) && c.mode==='roam' && !reduced;   // audience grooves to the beat
    var hop = dancing ? -Math.abs(Math.sin(t0/430*Math.PI + c.x*0.02))*7
            : moving ? -Math.abs(Math.sin(c.bob))*(1.5+e)
            : (c.mode==='perform' ? -Math.abs(Math.sin(performBob(c)))*3 : 0);
    var rs = c.scale || 1;
    c.el.style.transform = 'translate(' + c.x.toFixed(1) + 'px,' + (c.y+hop).toFixed(1) + 'px) scale(' + (c.face*rs).toFixed(3) + ',' + rs.toFixed(3) + ')';
    if (c.resident){                                      // follow the resident with its nameplate + speech bubble
      var px = (c.x + SP*0.5).toFixed(1);
      c.plate.style.transform  = 'translate(' + px + 'px,' + (c.y + SP*0.62).toFixed(1) + 'px) translate(-50%,0)';
      c.bubble.style.transform = 'translate(' + px + 'px,' + (c.y - SP*0.10).toFixed(1) + 'px) translate(-50%,-100%)';
    }
  }
}
function performBob(c){ return (t0*0.005) + (c.persona.role==='singer'?0:1.5); }

/* ── the gazebo performance scheduler (idle-gated) ── */
var perfActive = false, nextPerf = 12, performers = [];
var BITS = [], groove = 0, concertActive = false;        // composed "bits" accumulate -> groove builds -> a concert
var PREV = {}, pendingCelebration = null, celebrating = false, banner = null, sparkles = [];
function schedulePerf(dt){
  if (pendingCelebration && !perfActive){ startCelebration(pendingCelebration); pendingCelebration = null; return; }
  if (!(idle >= IDLE_WAKE) || reduced) { if (!celebrating) perfActive = false; return; }
  nextPerf -= dt;
  if (!perfActive && nextPerf <= 0){
    var avail = critters.filter(function(c){ return c.mode==='roam'; });
    if (groove >= 1 && avail.length >= 4 && !concertActive){ startConcert(avail); nextPerf = Rn(45, 80); return; }
    var singers = avail.filter(function(c){ return c.persona.role==='singer'; });
    var solo = Math.random() < 0.3 || avail.length < 3;
    if (solo && singers.length){ performers = [singers[(Math.random()*singers.length)|0]]; }
    else { performers = avail.slice().sort(function(){return Math.random()-0.5;}).slice(0, Math.min(5, Math.max(2, avail.length))); }
    if (!performers.length){ nextPerf = Rn(10,20); return; }
    var gz = gazebo();
    performers.forEach(function(c, i){
      var ang = Math.PI + (i/(performers.length-1||1))*Math.PI;
      c.mode = 'toGazebo'; c.target = { x: gz.x + Math.cos(ang)*gz.r*0.55 - SP/2, y: gz.y - 18 + Math.sin(ang)*gz.r*0.18 };
    });
    perfActive = true; nextPerf = Rn(22, 48);
    setTimeout(beginPerformance, 2600);                  // give them time to walk in
  }
}
function beginPerformance(){
  if (!perfActive) return;
  if (audioOn && audioReady) performSong(performers);     // coordinated, dynamic song over a chord progression
  setTimeout(function(){ performers.forEach(function(c){ if(c.mode==='perform') c.mode='roam'; c.cooldown=Rn(3,8); }); perfActive=false; performers=[]; }, 8200);
}

/* ── the CONCERT: groove has built up -> a longer chained piece with the instruments ── */
function startConcert(avail){
  perfActive = true; concertActive = true; banner = '♫ CONCERT ♫';
  var gz = gazebo();
  performers = avail.slice().sort(function(){return Math.random()-0.5;}).slice(0, Math.min(6, avail.length));
  var stations = [ {x:gz.x-gz.r*0.95, y:gz.y+6}, {x:gz.x+2, y:gz.y+18}, {x:gz.x+gz.r*0.95, y:gz.y} ];   // drums / keys / guitar
  performers.forEach(function(c,i){
    var pos = i<3 ? stations[i] : { x: gz.x + Math.cos(Math.PI + ((i-3)/Math.max(1,performers.length-4))*Math.PI)*gz.r*0.62, y: gz.y-20 };
    c.mode='toGazebo'; c.target={ x: pos.x - SP/2, y: pos.y - 16 };
    if (!c.origSrc && SPRITES[c.animal]){ c.origSrc=c.el.src; recolor(SPRITES[c.animal], c.color, BAND_UNIFORM).then(function(u){ if (concertActive) c.el.src=u; }); }   // into the band uniform
  });
  spawnSparkles(gz.x, gz.y-72, 44);
  setTimeout(beginConcert, 2900);
}
function beginConcert(){
  if (!concertActive) return;
  if (audioOn && audioReady) performConcert(performers);
  setTimeout(function(){ fireworkFinale();                 // finale of fireworks as the concert ends
    performers.forEach(function(c){ if(c.mode==='perform') c.mode='roam'; c.cooldown=Rn(4,10); if(c.origSrc){ c.el.src=c.origSrc; c.origSrc=null; } });   // back into their own clothes
    concertActive=false; perfActive=false; performers=[]; banner=null; groove=0; }, 16500);
}
function performConcert(group){                          // chains the recent composed BITS into one larger piece, with a band
  if (!AC || !audioReady || !group.length) return;
  var now=AC.currentTime+0.3, bar=0.9;
  var sections = BITS.length ? BITS.slice(-2) : [{prog:PROGRESSIONS[0], motif:[0,3,7,5,7,3], octave:1}];
  var singers = group.slice(3), t = now;
  sections.forEach(function(sec){ var prog=sec.prog;
    for (var b=0;b<prog.length*2;b++){ var bt=t+b*bar, root=prog[b%prog.length];
      drumHit('kick', bt, 0.3); drumHit('kick', bt+bar*0.5, 0.24);                                  // drums
      drumHit('snare', bt+bar*0.25, 0.16); drumHit('snare', bt+bar*0.75, 0.16);
      for (var h=0;h<4;h++) drumHit('hat', bt+h*bar*0.25, 0.05);
      [0,2,4].forEach(function(o,oi){ blip(degFreq(root+o,0), bt+oi*0.02, bar*0.6, 'sawtooth', 0.1); });   // guitar chord
      var m=sec.motif; for(var i=0;i<m.length;i++) blip(degFreq(m[i]+root, sec.octave||1), bt+i*(bar/m.length)*0.95, (bar/m.length)*0.9, 'triangle', 0.17);   // keyboard lead
      singers.forEach(function(c,ci){ if (b>0) blip(degFreq(root+[0,2,4][ci%3],0), bt, bar*0.85, c.persona.wave, 0.07); });   // backing voices
    }
    t += prog.length*2*bar;
  });
  group.forEach(function(c){ floatNote(c,'♫'); });
}
function drawInstruments(ts, gz){                        // little 8-bit instruments that sit at the gazebo (animate during a concert)
  var by=gz.y, lit = concertActive ? (0.5+0.5*Math.abs(Math.sin(ts*0.008))) : 0;
  var dx=gz.x-gz.r*0.95, dy=by+6;                        // drum set
  cx.fillStyle='#13222b'; cx.beginPath(); cx.ellipse(dx,dy,12,9,0,0,6.28); cx.fill();
  cx.fillStyle='#1a2f3a'; cx.fillRect(dx-15,dy-2,8,6); cx.fillRect(dx+8,dy-2,8,6);
  cx.strokeStyle='#5a6a76'; cx.lineWidth=1; cx.beginPath(); cx.moveTo(dx+11,dy-4); cx.lineTo(dx+17,dy-16); cx.stroke();
  cx.globalAlpha=0.6+0.4*lit; cx.fillStyle=concertActive?'#ffe08a':'#8aa0ad'; cx.beginPath(); cx.ellipse(dx+18,dy-17,6,2,0,0,6.28); cx.fill(); cx.globalAlpha=1;
  var kx=gz.x-22, ky=by+18;                              // keyboard
  cx.fillStyle='#0e1a22'; cx.fillRect(kx-2,ky-2,50,12);
  for (var i=0;i<8;i++){ var kl=concertActive && (((ts*0.006)|0)%8)===i; cx.fillStyle=kl?'#5ad4ff':'#d8e4ee'; cx.fillRect(kx+i*6,ky,5,9); }
  for (var j=0;j<7;j++){ cx.fillStyle='#16242c'; cx.fillRect(kx+4+j*6,ky,3,5); }
  cx.save(); cx.translate(gz.x+gz.r*0.95, by); cx.rotate(-0.5);   // guitar
  cx.fillStyle=concertActive?'#3a2a18':'#241c12'; cx.beginPath(); cx.ellipse(0,0,9,12,0,0,6.28); cx.fill();
  cx.fillStyle='#2a2018'; cx.fillRect(-2,-30,4,22);
  cx.strokeStyle=concertActive?'#ffe08a':'#6a7a86'; cx.globalAlpha=0.5+0.5*lit; cx.lineWidth=0.6;
  for (var s=-2;s<=2;s+=2){ cx.beginPath(); cx.moveTo(s,-30); cx.lineTo(s,10); cx.stroke(); }
  cx.globalAlpha=1; cx.restore();
}

/* ── CI-green celebration: critters gather + a victory fanfare when a repo flips to green ── */
function spawnSparkles(x, y, n){
  for (var i=0;i<(n||40);i++){ var a=Math.random()*6.28, sp=Rn(1,4.5);
    sparkles.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-1.2, life:Rn(45,95), max:95, c:['#3df0bb','#5ad4ff','#ffd23f'][i%3] }); }
}
function fanfare(){                                       // a bright MAJOR-key victory tune (vs the minor gazebo songs)
  if (!AC || !audioReady) return;
  var now = AC.currentTime + 0.1, maj = [0,4,7,12,16,19];
  maj.forEach(function(d,i){ blip(midi(KEY+12+d), now+i*0.11, 0.22, 'square', 0.22); });
  [0,4,7].forEach(function(d){ blip(midi(KEY+d), now+0.1, 1.5, 'triangle', 0.12); });
  for (var i=0;i<6;i++) blip(midi(KEY+24+[0,4,7,12][i%4]), now+0.75+i*0.08, 0.12, 'triangle', 0.1);
}
function startCelebration(name){
  celebrating = true; perfActive = true; banner = name;
  var gz = gazebo();
  performers = critters.slice(0, Math.min(6, critters.length));
  performers.forEach(function(c,i){
    var ang = Math.PI + (i/(performers.length-1||1))*Math.PI;
    c.mode='toGazebo'; c.target = { x: gz.x + Math.cos(ang)*gz.r*0.6 - SP/2, y: gz.y - 18 + Math.sin(ang)*gz.r*0.2 };
  });
  spawnSparkles(gz.x, gz.y-60, 36);
  setTimeout(beginCelebration, reduced?120:2200);         // let them walk in first
}
function beginCelebration(){
  if (!celebrating) return;
  fanfare(); spawnSparkles(gazebo().x, gazebo().y-70, 50);
  performers.forEach(function(c){ c.bob += 2; });
  setTimeout(function(){ performers.forEach(function(c){ c.mode='roam'; c.cooldown=Rn(2,6); }); celebrating=false; perfActive=false; performers=[]; banner=null; }, 6500);
}
function drawCelebration(ts){
  var gz = gazebo();
  if (banner){ cx.save(); cx.globalAlpha=0.92; cx.fillStyle='#3df0bb'; cx.textAlign='center';
    cx.font='20px ui-monospace,monospace'; cx.shadowColor='#3df0bb'; cx.shadowBlur=16;
    cx.fillText('✦ '+banner+' · CI green ✓', gz.x, gz.y-120); cx.shadowBlur=0; cx.textAlign='left'; cx.restore(); }
  for (var i=0;i<sparkles.length;i++){ var s=sparkles[i]; s.x+=s.vx; s.y+=s.vy; s.vy+=0.06; s.life-=1;
    if (s.life>0){ cx.globalAlpha=Math.max(0,s.life/s.max); cx.fillStyle=s.c; cx.fillRect(s.x|0,s.y|0,3,3); } }
  sparkles = sparkles.filter(function(s){ return s.life>0; }); cx.globalAlpha=1;
}

/* ── main loop + gating ── */
var _lastDraw = 0;
function loop(ts){
  requestAnimationFrame(loop);
  if (ts - _lastDraw < 32) return;                 // ~30fps cap — gentler on battery, esp. mobile / 120Hz screens
  _lastDraw = ts;
  t0 = ts; var dt = 1/30;
  if (!hidden && !lowPower){ stepWeather(dt); drawScene(ts); stepCritters(dt); manageCritters(dt); stepContentFeed(dt); schedulePerf(dt); updateFireworks(dt); demoTick(dt); }
}

/* ── host state: idle / heat / audio on / volume ── */
function applyAudio(){
  if (!audioOn){ if (master) master.gain.value = 0; return; }
  wakeAudio(); if (AC && audioReady){ startBed(); if (master) master.gain.setTargetAtTime(Math.max(0,Math.min(1,vol)), AC.currentTime, 0.5); }
}
/* host-state polling removed for the public edition — fixed lively defaults (heat 2, always awake) */
document.addEventListener('visibilitychange', function(){ hidden = document.hidden; });
if (navigator.getBattery) navigator.getBattery().then(function(b){
  var upd = function(){ lowPower = (!b.charging && b.level < 0.2); }; upd(); b.onchargingchange = upd; b.onlevelchange = upd; });

// ── a shared critter designed at /create/ (#c=<base64 spec>) walks into the village ──
var ACC_BY_NAME = { topHat:aTopHat, party:aParty, cap:aCap, beanie:aBeanie, crown:aCrown, glasses:aGlasses,
                    shades:aShades, bowtie:aBowtie, scarf:aScarf, flower:aFlower, headphones:aHeadphones };
function spawnGuest(spec){
  if (!spec || !SPRITES[spec.base]) return;
  var eye = /^#[0-9a-fA-F]{6}$/.test(spec.eye||'') ? spec.eye : '#5ad4ff';
  var outfit = (spec.outfit||[]).slice(0,4).map(function(p){ return { fn:ACC_BY_NAME[p&&p.item], c:(/^#[0-9a-fA-F]{6}$/.test(p&&p.color)?p.color:'#ffffff') }; }).filter(function(p){ return p.fn; });
  var name = String(spec.name||'').replace(/[<>]/g,'').slice(0,24);
  var scale = Math.max(1, Math.min(2, +spec.scale || 1.4));
  recolor(SPRITES[spec.base], eye, outfit).then(function(url){
    var el=document.createElement('img'); el.className='critter'; el.src=url; el.alt=name||'guest';
    el.style.transformOrigin='50% 92%'; el.style.filter='drop-shadow(0 3px 4px rgba(0,0,0,.45)) drop-shadow(0 0 9px '+eye+')';
    stage.appendChild(el);
    var plate=document.createElement('div'); plate.className='plate'; plate.style.color=eye; plate.style.opacity='0.92';
    plate.textContent=name||'a visitor'; stage.appendChild(plate);
    var bubble=document.createElement('div'); bubble.className='bubble'; stage.appendChild(bubble);
    var c={ el:el, plate:plate, bubble:bubble, resident:true, animal:spec.base, persona:persona(spec.base),
      color:eye, scale:scale, glow:eye, x:W*0.5, y:groundY()-4, angle:Rn(0,6.28), speed:Rn(0.5,1.0), bob:Rn(0,6), face:1, mode:'roam', cooldown:Rn(2,8) };
    critters.push(c); spawnSparkles(c.x+SP/2, c.y-20, 30); floatNote(c, '\u2726');
  });
}
function spawnGuestFromHash(){
  var m = (location.hash||'').match(/[#&]c=([^&]+)/); if (!m) return;
  var raw; try { raw = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(m[1]))))); } catch(e){ return; }
  spawnGuest(raw);
}
function boot(){
  var mob = innerWidth < 640;                             // mobile: fewer, calmer critters so the scene isn't crowded
  if (mob){ POP_MIN = 4; POP_MAX = 7; }
  buildScene();
  SPRITE_NAMES = Object.keys(SPRITES); if (!SPRITE_NAMES.length) return;
  var start = reduced ? 4 : (mob ? 6 : 10), shuffled = SPRITE_NAMES.slice().sort(function(){return Math.random()-0.5;});
  for (var i=0;i<start;i++) spawnCritter(shuffled[i % shuffled.length], {});   // initial ambient population
  startContentFeed();                                     // personality layer: quotes + live news + facts
  spawnGuestFromHash();                                   // a shared critter from a /create/ link, if present
  updateCredits();
  var sb = document.getElementById('sound'); if (sb) sb.addEventListener('click', toggleSound);
  requestAnimationFrame(loop);
}
var _rzT = null;
window.addEventListener('resize', function(){ clearTimeout(_rzT); _rzT = setTimeout(buildScene, 180); });   // debounce — kills the mobile address-bar re-seed churn
if (document.readyState !== 'loading') boot(); else document.addEventListener('DOMContentLoaded', boot);
</script>
