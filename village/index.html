<script>
/* The Village (public web edition) — an ambient, self-contained pixel village. Critters roam a themed
   night town and, at the gazebo, sing procedural 8-bit music. For personality they surface aspirational
   quotes (public-domain, bundled), live headlines (Hacker News), and on-this-day facts (Wikipedia).
   Fully client-side: no backend, no tracking, no private data. A small interactive page for xclusivexo.com. */
"use strict";
var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
var SENT = [255,0,255], SP = 76;
var heat = 2, idle = 0, audioOn = false, vol = 0.5, hidden = false, lowPower = false;
var critters = [], W = innerWidth, H = innerHeight, t0 = 0;
// EXPLORE = walkable side-scroller mode (player + follow-camera + wide world). Default OFF so the
// local ambient desktop village is unchanged; the public web build flips it on (see gen_village_public.py).
var EXPLORE = false, WORLD_W = innerWidth, cameraX = 0, player = null, keyL = false, keyR = false, taken = false;
var cycleT = 0, CYCLE_HALF = 600;   // EXPLORE day/night: 600s day + 600s night (10 min each); cycleT advances in stepCamera
function cyclePhase(){ return ((Date.now()/1000) % (2*CYCLE_HALF)) / (2*CYCLE_HALF); }   // wall-clock -> every client shares the same time-of-day (0=dawn, 0.5=dusk)
function clampN(v,a,b){ return v<a?a:(v>b?b:v); }
function worldW(){ return EXPLORE ? 2800 : W; }          // FIXED width — every client shares the same world size (not viewport-scaled), so a space is one consistent instance
function stepCamera(){                                   // follow the player; centre the world until the user takes control
  if (!EXPLORE) { cameraX = 0; return; }
  cycleT += 1/30;                                       // advance the day/night clock (once per ~30fps frame)
  updateEnterHint();                                    // show the ⏎ enter/leave prompt near a building / inside one
  var ww = INSIDE ? INT_W : WORLD_W;
  var tgt = clampN(player && (taken||INSIDE) ? player.x - W/2 + 16 : (ww - W)/2, 0, Math.max(0, ww - W));
  cameraX += (tgt - cameraX) * 0.12;
}
var cv = document.getElementById('scene'), cx = cv.getContext('2d');
function DPR(){ return Math.max(1, Math.min(3, window.devicePixelRatio||1)); }   // crisp on hi-DPI displays; capped at 3 (backing-store RAM)
function sizeCanvas(){ var d=DPR(); cv.width=Math.round(W*d); cv.height=Math.round(H*d); cv.style.width=W+'px'; cv.style.height=H+'px'; cx.setTransform(d,0,0,d,0,0); }   // backing store = W*d x H*d; base transform keeps every draw in CSS px
var stage = document.getElementById('stage'), tag = document.getElementById('tag');
var IDLE_WAKE = 0;                                    // 0 = always lively (no idle wait) — they start as soon as the village opens

/* ── Critter personalities (data-driven — add an entry to give a new animal a voice + quirk) ──
   motif = MIDI notes (relative singing line); role: singer (leads), harmony (holds a chord tone),
   peep (chirps + joins). key is the village key the gazebo harmonizes in. */
var KEY = 57;                                         // A3 — the village's home note (MIDI)
var SCALE = [0,2,3,5,7,8,10,12];                      // natural minor degrees
var PERSONA = {
  cat:      { role:'singer',  wave:'triangle', octave:1,  motif:[0,3,7,5,7,12,10,7], quirk:'diva',   tag:'the diva' },
  frog:     { role:'singer',  wave:'square',   octave:-1, motif:[0,0,7,0,5,0,3,0],   quirk:'croak',  tag:'the cantor' },
  owl:      { role:'singer',  wave:'triangle', octave:-1, motif:[0,4,7,4,0,7,5,0],   quirk:'hoot',   tag:'the nightcantor' },
  bird:     { role:'singer',  wave:'triangle', octave:2,  motif:[12,14,12,10,12,7],  quirk:'flit',   tag:'the songbird' },
  fox:      { role:'harmony', wave:'sawtooth', octave:0,  motif:[7,10,7,12],         quirk:'prowl',  tag:'the prowler' },
  mouse:    { role:'harmony', wave:'square',   octave:1,  motif:[12,10,7,5,3],       quirk:'dart',   tag:'the tinkerer' },
  hedgehog: { role:'harmony', wave:'square',   octave:0,  motif:[3,5,3,0],           quirk:'curl',   tag:'the harmonist' },
  bear:     { role:'bass',    wave:'sawtooth', octave:-2, motif:[0,4,0],             quirk:'lumber', tag:'the bass' },
  rabbit:   { role:'peep',    wave:'square',   octave:1,  motif:[7,7,12,7],          quirk:'hop',    tag:'the hopper' },
  chick:    { role:'peep',    wave:'triangle', octave:2,  motif:[12,12,7],           quirk:'follow', tag:'the peep' }
};
var DEF = { role:'peep', wave:'square', octave:1, motif:[0,7,12], quirk:'amble', tag:'villager' };
function persona(name){ return PERSONA[name] || DEF; }

/* ── Procedural 8-bit audio (no samples, all oscillators) ── */
var AC = null, master = null, musicBus = null, bed = [], audioReady = false;
function midi(n){ return 440 * Math.pow(2, (n - 69) / 12); }
function ensureAudio(){
  if (AC) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0; master.connect(AC.destination);
    musicBus = AC.createGain(); musicBus.gain.value = 0; musicBus.connect(master);   // separate bus for looped + club music (independent of the critter blips on master)
  } catch(e){ AC = null; }
}
function wakeAudio(){                                 // resume the context (may need a gesture on some webviews)
  if (!AC) ensureAudio();
  if (AC && AC.state === 'suspended') AC.resume().then(function(){ audioReady = (AC.state==='running'); });
  else if (AC) audioReady = (AC.state === 'running');
}
function startBed(){                                  // soft filtered-noise AIR bed (no tonal pitch = no hum) — replaces the old sine drone
  if (!AC || bed.length) return;
  var src = AC.createBufferSource(); src.buffer = getNoise(); src.loop = true;
  var fl = AC.createBiquadFilter(); fl.type = 'lowpass'; fl.frequency.value = 650; fl.Q.value = 0.4;
  var g = AC.createGain(); g.gain.value = 0.014;             // very soft breathing air, not a constant tone
  src.connect(fl); fl.connect(g); g.connect(master); src.start();
  var lfo = AC.createOscillator(), lg = AC.createGain();      // slow swell so the air breathes
  lfo.type = 'sine'; lfo.frequency.value = 0.05; lg.gain.value = 0.009; lfo.connect(lg); lg.connect(g.gain); lfo.start();
  bed.push({o:src,g:g}, {o:lfo,g:lg});
}
function sfx(kind){                                   // small action noises (very soft; gated on audio)
  if (!AC || !audioReady || !audioOn) return;
  var t = AC.currentTime + 0.005;
  if (kind==='step'){ blip(104 + Math.random()*16, t, 0.05, 'triangle', 0.025, master); }              // soft footstep tick (kept quiet)
  else if (kind==='greet'){ blip(660, t, 0.07, 'sine', 0.045, master); blip(880, t+0.07, 0.06, 'sine', 0.035, master); }   // a friendly two-note "hi"
  else if (kind==='jump'){ var o=AC.createOscillator(), g=AC.createGain(); o.type='square'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(700,t+0.16);
    g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2); o.connect(g); g.connect(master); o.start(t); o.stop(t+0.22); }   // boing
  else if (kind==='pop'){ blip(560, t, 0.05, 'sine', 0.05, master); blip(740, t+0.05, 0.05, 'sine', 0.04, master); }
  else if (kind==='play'){ blip(523, t, 0.05, 'square', 0.04, master); blip(659, t+0.05, 0.05, 'square', 0.035, master); blip(784, t+0.1, 0.06, 'square', 0.03, master); }   // arcade cabinet: a little rising game arpeggio
  else if (kind==='art'){ blip(880, t, 0.18, 'sine', 0.03, master); blip(1320, t+0.02, 0.16, 'sine', 0.02, master); }                                                       // gallery: a soft chime
  else if (kind==='water'){ blip(440, t, 0.08, 'sine', 0.038, master); blip(300, t+0.06, 0.11, 'sine', 0.028, master); }                                                    // garden pond: a droplet plip
  else if (kind==='leaf'){ blip(200, t, 0.07, 'triangle', 0.02, master); blip(170, t+0.06, 0.07, 'triangle', 0.016, master); }                                              // garden tree: a soft rustle
  else if (kind==='clink'){ blip(1175, t, 0.12, 'sine', 0.028, master); blip(1568, t+0.03, 0.1, 'sine', 0.02, master); }                                                    // lounge bar: a glassy clink
}
var ambT = 1;
function ambienceTick(dt){                            // day = occasional birds, night = crickets (village only; soft, on top of the air bed)
  if (!EXPLORE || !audioOn || !AC || !audioReady || INSIDE) return;
  ambT -= dt; if (ambT > 0) return;
  var t = AC.currentTime + 0.02, df = (typeof dayFactor==='function') ? dayFactor() : 1;
  if (df < 0.28){ for (var i=0;i<3;i++) blip(midi(95 + ((i*5)%7)), t + i*0.05, 0.035, 'triangle', 0.028, master); ambT = Rn(2.5, 6); }   // crickets
  else { var bn=[84,88,86,91,89]; for (var j=0;j<3;j++) blip(midi(bn[(Math.random()*bn.length)|0]), t + j*0.09, 0.07, 'sine', 0.03, master); ambT = Rn(4.5, 10); }   // birds
}
function blip(freq, when, dur, wave, peak, dest){     // one 8-bit note with a quick envelope (dest defaults to master)
  if (!AC || !audioReady) return;
  var o = AC.createOscillator(), g = AC.createGain();
  o.type = wave || 'square'; o.frequency.setValueAtTime(freq, when);
  g.gain.setValueAtTime(0.0001, when);
  g.gain.exponentialRampToValueAtTime(peak || 0.18, when + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, when + (dur || 0.18));
  o.connect(g); g.connect(dest||master); o.start(when); o.stop(when + (dur || 0.18) + 0.02);
}
var noiseBuf = null;
function getNoise(){ if (noiseBuf || !AC) return noiseBuf; var n=(AC.sampleRate*0.3)|0, b=AC.createBuffer(1,n,AC.sampleRate), d=b.getChannelData(0); for(var i=0;i<n;i++) d[i]=Math.random()*2-1; noiseBuf=b; return b; }
function drumHit(type, when, gain){                   // 8-bit percussion: kick (pitch-drop sine), snare/hat (filtered noise)
  if (!AC || !audioReady) return;
  if (type==='kick'){ var o=AC.createOscillator(), g=AC.createGain(); o.frequency.setValueAtTime(135,when); o.frequency.exponentialRampToValueAtTime(45,when+0.12);
    g.gain.setValueAtTime(gain||0.3,when); g.gain.exponentialRampToValueAtTime(0.001,when+0.16); o.connect(g); g.connect(master); o.start(when); o.stop(when+0.18); return; }
  var s=AC.createBufferSource(); s.buffer=getNoise(); var fl=AC.createBiquadFilter();
  fl.type=type==='hat'?'highpass':'bandpass'; fl.frequency.value=type==='hat'?7000:1800;
  var g2=AC.createGain(), dur=type==='hat'?0.04:0.13; g2.gain.setValueAtTime(gain||0.16,when); g2.gain.exponentialRampToValueAtTime(0.001,when+dur);
  s.connect(fl); fl.connect(g2); g2.connect(master); s.start(when); s.stop(when+dur+0.02);
}
function noteFor(p, degreeIdx){                       // map a motif step (scale degree) to a frequency
  var deg = SCALE[((degreeIdx % SCALE.length) + SCALE.length) % SCALE.length];
  return midi(KEY + deg + 12 * (p.octave || 0));
}
function emote(c){                                    // a short signature chirp as a critter roams
  if (!AC || !audioReady) return;
  var p = c.persona, now = AC.currentTime, m = p.motif;
  for (var i = 0; i < Math.min(2, m.length); i++) blip(noteFor(p, m[i]), now + i*0.09, 0.12, p.wave, 0.12);
  floatNote(c, '♪');
}
function sing(c, startAt, tempo, transpose){          // a full melodic line at the gazebo
  if (!AC || !audioReady) return;
  var p = c.persona, step = tempo || 0.34, tr = transpose || 0;
  p.motif.forEach(function(d, i){
    blip(noteFor(p, d + tr), startAt + i*step, step*0.92, p.wave, p.role==='singer'?0.2:0.14);
  });
  floatNote(c, p.role === 'singer' ? '♫' : '♩');
  return startAt + p.motif.length * step;
}
function harmonize(group){                            // several critters sing together — a synced round/chord
  if (!AC || !audioReady) return;
  var now = AC.currentTime + 0.15, chord = [0, 0, 4, 7];     // each voice offset within the key
  group.forEach(function(c, i){
    var transpose = chord[i % chord.length];
    var delay = c.persona.role === 'singer' ? 0 : 0.5;       // singers lead, harmony comes in on the off-phrase
    sing(c, now + delay, 0.32, transpose);
  });
}

var PROGRESSIONS = [[0,5,3,4],[0,3,4,0],[0,6,4,5],[0,2,5,4]];   // chord roots as scale-degree indices (minor colour)
function degFreq(idx, octave){                          // a scale-degree index (may exceed an octave) -> frequency
  var n=SCALE.length, deg=SCALE[((idx%n)+n)%n], oct=Math.floor(idx/n)+(octave||0);
  return midi(KEY + deg + 12*oct);
}
function performSong(group){                            // a COORDINATED, dynamic gazebo song over a chord progression
  if (!AC || !audioReady || !group.length) return;
  var now=AC.currentTime+0.2, bar=0.92, prog=PROGRESSIONS[(Math.random()*PROGRESSIONS.length)|0];
  var round = group.length>=3 && Math.random()<0.4;    // sometimes a staggered canon instead of parts
  var lead = group.filter(function(c){return c.persona.role==='singer';})[0] || group[0];
  var bars = prog.length*2;
  group.forEach(function(c, vi){
    var p=c.persona, entry = now + (round ? vi*bar*0.5 : Math.min(vi,2)*bar);   // canon entry / parts build up
    floatNote(c, p.role==='peep'?'♩':'♫');
    for (var b=0;b<bars;b++){ var t=entry + b*bar, root=prog[b%prog.length];
      if (round){ var m=lead.persona.motif; for(var i=0;i<m.length;i++) blip(degFreq(m[i]+root,p.octave), t+i*(bar/m.length)*0.95, (bar/m.length)*0.9, p.wave, 0.15); }
      else if (c===lead){ var mm=p.motif; for(var j=0;j<mm.length;j++) blip(degFreq(mm[j]+root,p.octave), t+j*(bar/mm.length)*0.95, (bar/mm.length)*0.9, p.wave, 0.2); }
      else if (p.role==='bass'){ blip(degFreq(root,-1), t, bar*0.9, 'sawtooth', 0.14); }
      else if (p.role==='peep'){ blip(degFreq(root+7,p.octave), t+bar*0.5, bar*0.25, p.wave, 0.1); }
      else { blip(degFreq(root+[0,2,4][vi%3],0), t, bar*0.9, p.wave, 0.12); }   // harmony: a triad tone
    }
  });
  BITS.push({ prog:prog, motif:lead.persona.motif, octave:lead.persona.octave }); if (BITS.length>6) BITS.shift();
  groove = Math.min(1, groove + 0.25);                 // each song composes a "bit" + builds toward a concert
}

/* ── floating note glyph above a critter ── */
function critTop(c){ var rs=c.scale||1; return c.y + 85 - 79*rs; }   // screen-Y of the critter's head top (accounts for the foot-pivot scaling) — anchors plates/bubbles/emoji above the head
function floatNote(c, glyph){
  var n = document.createElement('div'); n.className = 'note'; n.textContent = glyph;
  stage.appendChild(n);
  var ex = c.x-cameraX+30, ey = critTop(c)-8;
  n.style.transform = 'translate(' + ex + 'px,' + ey.toFixed(1) + 'px)';
  requestAnimationFrame(function(){ n.style.opacity = '1';
    n.style.transform = 'translate(' + (ex+(Math.random()*16-8)) + 'px,' + (ey-32).toFixed(1) + 'px)'; });   // rise from just above the head
  setTimeout(function(){ n.style.opacity = '0'; setTimeout(function(){ n.remove(); }, 500); }, 900);
}

/* ── player toys: a reaction wheel + a little musician (EXPLORE only; DOM exists only in the web build) ── */
var REACTIONS = ['😊','😂','❤️','👍','🙌','😮','😢','😍','🎉','🔥','✨','👋'];

var curInstrument = 0, tunePlaying = false;
function playTune(tuneIdx, instIdx){
  if (tunePlaying) return;
  var tune = TUNES[tuneIdx]; if (!tune) return; var inst = INSTRUMENTS[instIdx||0] || INSTRUMENTS[0];
  ensureAudio(); if (!AC) return;
  AC.resume().then(function(){
    audioReady = (AC.state === 'running'); if (!audioReady) return;
    if (master) master.gain.setTargetAtTime(0.5, AC.currentTime, 0.01);   // audible even if ambient sound is off
    var beat = 0.34, t0a = AC.currentTime + 0.06, t = t0a, maxEnd = 0;
    tune.notes.forEach(function(n){ var dur = n[1]*beat, ring = dur*inst.rel*0.92; blip(midi(n[0]), t, ring, inst.wave, inst.peak); maxEnd = Math.max(maxEnd, (t - t0a) + ring); t += dur; });
    tunePlaying = true; if (player) floatNote(player, '🎵');
    setTimeout(function(){ tunePlaying = false; if (master && AC) master.gain.setTargetAtTime(audioOn?vol:0, AC.currentTime, 0.06); }, (maxEnd+0.35)*1000);   // restore after the real audio tail, not just the beat sum
  });
}
/* ── looped ambient music (EXPLORE/village only — gentle A-minor-pentatonic motifs on the music bus; the ambient non-EXPLORE build stays drone-only) ── */
var LOOPS = [   // longer developed phrases (A-minor pentatonic) so the ambient line has shape, not just a short motif
  [[57,1],[60,1],[64,2],[62,1],[60,1],[64,1],[67,2],[69,1],[67,1],[64,2],[62,1],[60,1],[57,2],[60,1],[62,1],[64,3]],
  [[64,1.5],[67,1.5],[69,1],[72,1],[69,2],[67,1],[64,1],[62,2],[60,1],[64,1],[62,1],[57,1],[60,2],[57,3]],
  [[69,1],[67,1],[64,1],[62,1],[60,2],[57,1],[60,1],[64,1],[67,1],[69,2],[67,1],[64,1],[60,1],[62,1],[64,2],[57,3]],
  [[60,2],[62,1],[64,1],[67,2],[64,1],[62,1],[60,2],[57,1],[60,1],[62,2],[64,1],[67,1],[69,2],[67,2]]
];
var loopOn = false, loopIdx = 0, loopTimer = null;
function scheduleLoop(){
  if (!loopOn) return;
  if (!audioOn || !AC || !audioReady){ loopTimer = setTimeout(scheduleLoop, 1000); return; }   // wait for the sound-on gesture; never sound while muted
  if (musicBus) musicBus.gain.setTargetAtTime(0.6, AC.currentTime, 0.8);                         // gentle fade-in
  var seq = LOOPS[loopIdx % LOOPS.length], beat = 0.42, t0a = AC.currentTime + 0.05, t = t0a, maxEnd = 0;
  seq.forEach(function(n){ var dur = n[1]*beat, ring = dur*1.5; blip(midi(n[0]), t, ring, 'sine', 0.11, musicBus); maxEnd = Math.max(maxEnd, (t - t0a) + ring); t += dur; });
  loopIdx++;
  loopTimer = setTimeout(scheduleLoop, Math.max(1200, maxEnd*1000));                             // re-arm off the measured tail -> seamless loop
}
function startLoop(){ if (loopOn || !EXPLORE) return; loopOn = true; scheduleLoop(); }            // village (EXPLORE) only; the ambient build keeps its drone
function stopLoop(){ loopOn = false; if (loopTimer){ clearTimeout(loopTimer); loopTimer = null; } if (musicBus && AC) musicBus.gain.setTargetAtTime(0, AC.currentTime, 0.4); }
function closeToys(){ ['reactWheel','musicPanel','animWheel'].forEach(function(id){ var e=document.getElementById(id); if(e){ e.dataset.open='0'; e.style.display='none'; } }); }
function openReactWheel(){
  var w=document.getElementById('reactWheel'); if(!w) return;
  if (w.dataset.open==='1'){ closeToys(); return; }
  closeToys(); w.innerHTML=''; w.dataset.open='1'; w.style.display='block';
  var n=REACTIONS.length, R=88, C=110;
  REACTIONS.forEach(function(em,i){ var ang=-Math.PI/2 + (i/n)*2*Math.PI;
    var b=document.createElement('button'); b.type='button'; b.className='reactItem'; b.textContent=em;
    b.style.left=(C+R*Math.cos(ang))+'px'; b.style.top=(C+R*Math.sin(ang))+'px';
    b.addEventListener('click', function(e){ e.stopPropagation(); if(player) floatNote(player, em); if(typeof broadcastEmote==='function') broadcastEmote('react', em); closeToys(); });   // others SEE your reaction
    w.appendChild(b); });
}
function openMusicPanel(){
  var p=document.getElementById('musicPanel'); if(!p) return;
  if (p.dataset.open==='1'){ closeToys(); return; }
  closeToys(); p.innerHTML=''; p.dataset.open='1'; p.style.display='block';
  var ir=document.createElement('div'); ir.className='mpRow'; ir.innerHTML='<span class="mpLabel">instrument</span>';
  INSTRUMENTS.forEach(function(inst,i){ var c=document.createElement('button'); c.type='button'; c.className='mpChip'+(i===curInstrument?' on':''); c.textContent=inst.name;
    c.addEventListener('click', function(e){ e.stopPropagation(); curInstrument=i; [].forEach.call(ir.querySelectorAll('.mpChip'),function(x){x.classList.remove('on');}); c.classList.add('on'); }); ir.appendChild(c); });
  p.appendChild(ir);
  var tr=document.createElement('div'); tr.className='mpRow'; tr.innerHTML='<span class="mpLabel">tune</span>';
  TUNES.forEach(function(tune,i){ var c=document.createElement('button'); c.type='button'; c.className='mpChip'; c.textContent=tune.name;
    c.addEventListener('click', function(e){ e.stopPropagation(); playTune(i, curInstrument); }); tr.appendChild(c); });
  var rnd=document.createElement('button'); rnd.type='button'; rnd.className='mpChip rnd'; rnd.textContent='🎲 random';
  rnd.addEventListener('click', function(e){ e.stopPropagation(); playTune((Math.random()*TUNES.length)|0, curInstrument); }); tr.appendChild(rnd);
  p.appendChild(tr);
}
var ANIMATIONS = [ {k:'wave',label:'👋'}, {k:'jump',label:'⤴️'}, {k:'spin',label:'🌀'}, {k:'dance',label:'💃'}, {k:'sit',label:'🪑'}, {k:'cheer',label:'🙌'} ];
function openAnimWheel(){                                  // a radial wheel of avatar animations (mirrors the reaction wheel)
  var w=document.getElementById('animWheel'); if(!w) return;
  if (w.dataset.open==='1'){ closeToys(); return; }
  closeToys(); w.innerHTML=''; w.dataset.open='1'; w.style.display='block';
  var n=ANIMATIONS.length, R=80, C=110;
  ANIMATIONS.forEach(function(a,i){ var ang=-Math.PI/2 + (i/n)*2*Math.PI;
    var b=document.createElement('button'); b.type='button'; b.className='reactItem'; b.textContent=a.label; b.title=a.k;
    b.style.left=(C+R*Math.cos(ang))+'px'; b.style.top=(C+R*Math.sin(ang))+'px';
    b.addEventListener('click', function(e){ e.stopPropagation(); setAnim(a.k, a.label); closeToys(); });
    w.appendChild(b); });
}
function setAnim(k, label){                                // trigger a player pose; momentary poses auto-expire, sit holds
  if(!player) return;
  player.anim=k; player.animUntil=(k==='sit')?1e12:(t0+2200);
  player.dancing=(k==='dance');
  if (k==='jump') sfx('jump'); else if (k==='cheer') sfx('pop');
  floatNote(player, label||'✨');
  if (typeof broadcastEmote==='function') broadcastEmote('anim', k);   // others SEE your pose play on your critter
}
function setupPlayerUI(){
  var rb=document.getElementById('reactBtn'), mb=document.getElementById('musicBtn'), ab=document.getElementById('animBtn');
  if(rb){ rb.addEventListener('click', function(e){ e.stopPropagation(); openReactWheel(); }); }   // visibility handled by #dock
  if(mb){ mb.addEventListener('click', function(e){ e.stopPropagation(); openMusicPanel(); }); }
  if(ab){ ab.addEventListener('click', function(e){ e.stopPropagation(); openAnimWheel(); }); }
  document.addEventListener('click', closeToys);
}

function aShades(g,c){ g.fillStyle='#15171c'; g.fillRect(9,17,6,4); g.fillRect(17,17,6,4); g.fillRect(15,18,2,1); }

function _pa(a){ return a[(Math.random()*a.length)|0]; }
function _pc(){ return ACCENT[(Math.random()*ACCENT.length)|0]; }
function pickOutfit(){ var o=[];                          // a simple multi-piece outfit: maybe a hat, maybe glasses, maybe a neck-piece
  if (Math.random()<0.6) o.push({fn:_pa(HATS),c:_pc()}); else if (Math.random()<0.3) o.push({fn:aFlower,c:_pc()});
  if (Math.random()<0.35) o.push({fn:_pa(FACE),c:_pc()});

function recolor(dataUri, hex, outfit){
  return new Promise(function(resolve){
    var img = new Image();
    img.onload = function(){
      var c = document.createElement('canvas'); c.width = img.width; c.height = img.height;
      var g = c.getContext('2d'); g.drawImage(img,0,0);
      var d = g.getImageData(0,0,c.width,c.height), p = d.data;
      var R = parseInt(hex.slice(1,3),16), G = parseInt(hex.slice(3,5),16), B = parseInt(hex.slice(5,7),16);
      for (var i=0;i<p.length;i+=4){ if(p[i]===SENT[0]&&p[i+1]===SENT[1]&&p[i+2]===SENT[2]&&p[i+3]>0){ p[i]=R;p[i+1]=G;p[i+2]=B; } }
      g.putImageData(d,0,0);
      if (outfit) outfit.forEach(function(a){ try{ a.fn(g, a.c); }catch(e){} });   // bake the outfit pieces on top
      resolve(c.toDataURL());
    };
    img.onerror = function(){ resolve(dataUri); };   // a decode failure degrades to the un-recolored sprite, never a permanently-pending promise
    img.src = dataUri;
  });
}

/* ── the gazebo performance scheduler (idle-gated) ── */
var perfActive = false, nextPerf = 12, performers = [];

  if (ROOM) return;                                      // no gazebo inside a room

  if (!(idle >= IDLE_WAKE) || reduced) { if (!celebrating) perfActive = false; return; }
  nextPerf -= dt;

    var avail = critters.filter(function(c){ return c.mode==='roam'; });
    if (groove >= 1 && avail.length >= 4 && !concertActive){ startConcert(avail); nextPerf = Rn(45, 80); return; }
    var singers = avail.filter(function(c){ return c.persona.role==='singer'; });
    var solo = Math.random() < 0.3 || avail.length < 3;
    if (solo && singers.length){ performers = [singers[(Math.random()*singers.length)|0]]; }
    else { performers = avail.slice().sort(function(){return Math.random()-0.5;}).slice(0, Math.min(5, Math.max(2, avail.length))); }
    if (!performers.length){ nextPerf = Rn(10,20); return; }

function beginPerformance(){

  setTimeout(function(){ performers.forEach(function(c){ if(c.mode==='perform') c.mode='roam'; c.cooldown=Rn(3,8); }); perfActive=false; performers=[]; }, 8200);

/* ── the CONCERT: groove has built up -> a longer chained piece with the instruments ── */
function startConcert(avail){

  var stations = [ {x:gz.x-gz.r*0.95, y:gz.y+6}, {x:gz.x+2, y:gz.y+18}, {x:gz.x+gz.r*0.95, y:gz.y} ];   // drums / keys / guitar
