<script>
/* The Village (public web edition) — an ambient, self-contained pixel village. Critters roam a themed
   night town and, at the gazebo, sing procedural 8-bit music. For personality they surface aspirational
   quotes (public-domain, bundled), live headlines (Hacker News), and on-this-day facts (Wikipedia).
   Fully client-side: no backend, no tracking, no private data. A small interactive page for xclusivexo.com. */
"use strict";
var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
var SENT = [255,0,255], SP = 76;
var heat = 2, idle = 0, audioOn = false, vol = 0.5, hidden = false, lowPower = false;
var critters = [], W = innerWidth, H = innerHeight, t0 = 0;
// EXPLORE = walkable side-scroller mode (player + follow-camera + wide world). Default OFF so the
// local ambient desktop village is unchanged; the public web build flips it on (see gen_village_public.py).
var EXPLORE = false, WORLD_W = innerWidth, cameraX = 0, player = null, keyL = false, keyR = false, taken = false;
var cycleT = 0, CYCLE_HALF = 600;   // EXPLORE day/night: 600s day + 600s night (10 min each); cycleT advances in stepCamera
function cyclePhase(){ return ((Date.now()/1000) % (2*CYCLE_HALF)) / (2*CYCLE_HALF); }   // wall-clock -> every client shares the same time-of-day (0=dawn, 0.5=dusk)
function clampN(v,a,b){ return v<a?a:(v>b?b:v); }
function worldW(){ return EXPLORE ? 2800 : W; }          // FIXED width — every client shares the same world size (not viewport-scaled), so a space is one consistent instance
function stepCamera(){                                   // follow the player; centre the world until the user takes control
  if (!EXPLORE) { cameraX = 0; return; }
  cycleT += 1/30;                                       // advance the day/night clock (once per ~30fps frame)
  updateEnterHint();                                    // show the ⏎ enter/leave prompt near a building / inside one
  var ww = INSIDE ? INT_W : WORLD_W;
  var tgt = clampN(player && (taken||INSIDE) ? player.x - W/2 + 16 : (ww - W)/2, 0, Math.max(0, ww - W));
  cameraX += (tgt - cameraX) * 0.12;
}
var cv = document.getElementById('scene'), cx = cv.getContext('2d');
function DPR(){ return Math.max(1, Math.min(3, window.devicePixelRatio||1)); }   // crisp on hi-DPI displays; capped at 3 (backing-store RAM)
function sizeCanvas(){ var d=DPR(); cv.width=Math.round(W*d); cv.height=Math.round(H*d); cv.style.width=W+'px'; cv.style.height=H+'px'; cx.setTransform(d,0,0,d,0,0); }   // backing store = W*d x H*d; base transform keeps every draw in CSS px
var stage = document.getElementById('stage'), tag = document.getElementById('tag');
var IDLE_WAKE = 0;                                    // 0 = always lively (no idle wait) — they start as soon as the village opens

/* ── Critter personalities (data-driven — add an entry to give a new animal a voice + quirk) ──
   motif = MIDI notes (relative singing line); role: singer (leads), harmony (holds a chord tone),
   peep (chirps + joins). key is the village key the gazebo harmonizes in. */
var KEY = 57;                                         // A3 — the village's home note (MIDI)
var SCALE = [0,2,3,5,7,8,10,12];                      // natural minor degrees
var PERSONA = {
  cat:      { role:'singer',  wave:'triangle', octave:1,  motif:[0,3,7,5,7,12,10,7], quirk:'diva',   tag:'the diva' },
  frog:     { role:'singer',  wave:'square',   octave:-1, motif:[0,0,7,0,5,0,3,0],   quirk:'croak',  tag:'the cantor' },
  owl:      { role:'singer',  wave:'triangle', octave:-1, motif:[0,4,7,4,0,7,5,0],   quirk:'hoot',   tag:'the nightcantor' },
  bird:     { role:'singer',  wave:'triangle', octave:2,  motif:[12,14,12,10,12,7],  quirk:'flit',   tag:'the songbird' },
  fox:      { role:'harmony', wave:'sawtooth', octave:0,  motif:[7,10,7,12],         quirk:'prowl',  tag:'the prowler' },
  mouse:    { role:'harmony', wave:'square',   octave:1,  motif:[12,10,7,5,3],       quirk:'dart',   tag:'the tinkerer' },
  hedgehog: { role:'harmony', wave:'square',   octave:0,  motif:[3,5,3,0],           quirk:'curl',   tag:'the harmonist' },
  bear:     { role:'bass',    wave:'sawtooth', octave:-2, motif:[0,4,0],             quirk:'lumber', tag:'the bass' },
  rabbit:   { role:'peep',    wave:'square',   octave:1,  motif:[7,7,12,7],          quirk:'hop',    tag:'the hopper' },
  chick:    { role:'peep',    wave:'triangle', octave:2,  motif:[12,12,7],           quirk:'follow', tag:'the peep' }
};
var DEF = { role:'peep', wave:'square', octave:1, motif:[0,7,12], quirk:'amble', tag:'villager' };
function persona(name){ return PERSONA[name] || DEF; }

/* ── Procedural 8-bit audio (no samples, all oscillators) ── */
var AC = null, master = null, musicBus = null, bed = [], audioReady = false;
function midi(n){ return 440 * Math.pow(2, (n - 69) / 12); }
function ensureAudio(){
  if (AC) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0; master.connect(AC.destination);
    musicBus = AC.createGain(); musicBus.gain.value = 0; musicBus.connect(master);   // separate bus for looped + club music (independent of the critter blips on master)
  } catch(e){ AC = null; }
}
function wakeAudio(){                                 // resume the context (may need a gesture on some webviews)
  if (!AC) ensureAudio();
  if (AC && AC.state === 'suspended') AC.resume().then(function(){ audioReady = (AC.state==='running'); });
  else if (AC) audioReady = (AC.state === 'running');
}
function startBed(){                                  // soft filtered-noise AIR bed (no tonal pitch = no hum) — replaces the old sine drone
  if (!AC || bed.length) return;
  var src = AC.createBufferSource(); src.buffer = getNoise(); src.loop = true;
  var fl = AC.createBiquadFilter(); fl.type = 'lowpass'; fl.frequency.value = 650; fl.Q.value = 0.4;
  var g = AC.createGain(); g.gain.value = 0.014;             // very soft breathing air, not a constant tone
  src.connect(fl); fl.connect(g); g.connect(master); src.start();
  var lfo = AC.createOscillator(), lg = AC.createGain();      // slow swell so the air breathes
  lfo.type = 'sine'; lfo.frequency.value = 0.05; lg.gain.value = 0.009; lfo.connect(lg); lg.connect(g.gain); lfo.start();
  bed.push({o:src,g:g}, {o:lfo,g:lg});
}
function sfx(kind){                                   // small action noises (very soft; gated on audio)
  if (!AC || !audioReady || !audioOn) return;
  var t = AC.currentTime + 0.005;

/* ── the gazebo performance scheduler (idle-gated) ── */
var perfActive = false, nextPerf = 12, performers = [];

  if (!(idle >= IDLE_WAKE) || reduced) { if (!celebrating) perfActive = false; return; }
  nextPerf -= dt;

    var avail = critters.filter(function(c){ return c.mode==='roam'; });
    if (groove >= 1 && avail.length >= 4 && !concertActive){ startConcert(avail); nextPerf = Rn(45, 80); return; }
    var singers = avail.filter(function(c){ return c.persona.role==='singer'; });
    var solo = Math.random() < 0.3 || avail.length < 3;
    if (solo && singers.length){ performers = [singers[(Math.random()*singers.length)|0]]; }
    else { performers = avail.slice().sort(function(){return Math.random()-0.5;}).slice(0, Math.min(5, Math.max(2, avail.length))); }
    if (!performers.length){ nextPerf = Rn(10,20); return; }

      c.mode = 'toGazebo'; c.target = { x: gz.x + Math.cos(ang)*gz.r*0.55 - SP/2, y: gz.y - 18 + Math.sin(ang)*gz.r*0.18 };

  setTimeout(function(){ performers.forEach(function(c){ if(c.mode==='perform') c.mode='roam'; c.cooldown=Rn(3,8); }); perfActive=false; performers=[]; }, 8200);
}

/* ── the CONCERT: groove has built up -> a longer chained piece with the instruments ── */
function startConcert(avail){

  var stations = [ {x:gz.x-gz.r*0.95, y:gz.y+6}, {x:gz.x+2, y:gz.y+18}, {x:gz.x+gz.r*0.95, y:gz.y} ];   // drums / keys / guitar
